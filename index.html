<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Soldier vs. Pirates</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="game-container">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="hud" class="hidden">
      <span id="score-display">Score: 0</span>
      <span id="level-display">Level: 1</span>
      <span id="lives-display">Lives: ♥ ♥ ♥</span>
    </div>

    <div id="level-up-banner" class="hidden">LEVEL UP! Now Level <span id="new-level-num">2</span></div>

    <div id="start-screen" class="screen hidden">
      <h1>SOLDIER VS PIRATES</h1>
      <p>Arrow Keys to move &middot; Spacebar to fire</p>
      <p>Defend against 4 waves of increasingly dangerous pirates!</p>
      <button id="start-button">Start Game</button>
    </div>

    <div id="game-over-screen" class="screen hidden">
      <h1>GAME OVER</h1>
      <p>Final Score: <span id="final-score">0</span></p>
      <button id="restart-button">Restart</button>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/input.js"></script>
  <script src="js/sprites.js"></script>
  <script src="js/player.js"></script>
  <script src="js/bullet.js"></script>
  <script src="js/pirate.js"></script>
  <script src="js/collision.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
